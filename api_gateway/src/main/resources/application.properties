spring.application.name=api_gateway


spring.cloud.gateway.server.webflux.routes[0].id=customer-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://customer-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/customers/**

spring.cloud.gateway.server.webflux.routes[1].id=bank-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://bank-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/movements/**
spring.cloud.gateway.server.webflux.routes[1].predicates[1]=Path=/api/v1/accounts/**


