# docker compose -f docker-compose.yml up -d
services:
  customers-api:
    build:
      context: ./customers
      dockerfile: Dockerfile
    restart: always
    environment:
      TZ: America/Lima
      SERVER_PORT: ${HOST_PORT_CUSTOMERS_API}
      SPRING_WEBFLUX_BASE-PATH: /api/v1.0/
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-customers:${DB_PORT}/${DB_NAME_CUSTOMERS}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_SWAGGER-UI_PATH: /swagger-ui.html
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    deploy:
      replicas: 1
    ports:
      - "${HOST_PORT_CUSTOMERS_API}:9000"
  bank-api:
    build:
      context: ./bank
      dockerfile: Dockerfile
    restart: always
    environment:
      TZ: America/Lima
      SERVER_PORT: ${HOST_PORT_BANK_API}
      SERVER_SERVLET_CONTEXT_PATH: /api/v1.0/
      SPRING_DATASOURCE_URL: jdbc:postgresql://db-bank:${DB_PORT}/${DB_NAME_BANK}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_SWAGGER-UI_PATH: /swagger-ui.html
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    deploy:
      replicas: 1
    ports:
      - "${HOST_PORT_BANK_API}:9001"

  db-customers:
    image: postgres:17.2-alpine3.21
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME_CUSTOMERS}
      PG_DATA: /var/lib/postgresql/data/pgdata
    volumes:
      - "postgres_data_customers:/var/lib/postgresql/data"
    expose:
      - ${DB_PORT}
  db-bank:
    image: postgres:17.2-alpine3.21
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME_BANK}
      PG_DATA: /var/lib/postgresql/data/pgdata
    volumes:
      - "postgres_data_bank:/var/lib/postgresql/data"
    expose:
      - ${DB_PORT}

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    expose:
      - 2181
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:{KAFKA_PORT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_PORT}
    expose:
      - ${KAFKA_PORT}
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    volumes:
      - ./scripts/create-topics.sh:/create-topics.sh
    entrypoint: [ "bash", "/create-topics.sh" ]

  redis:
    image: redis:7
    expose:
      - ${REDIS_PORT}
    volumes:
      - "redis_data:/data"
volumes:
  postgres_data_customers:
  postgres_data_bank:
  redis_data:
  kafka_data:
