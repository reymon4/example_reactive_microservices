spring.application.name=bank

server.port=8082
spring.webflux.base-path=/api/v1.0/

spring.datasource.url=jdbc:postgresql://localhost:5432/bank
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#OpenAPI/Swagger configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#Customers service
customers.service.base-url=http://localhost:8081/api/v1.0/customers

#Circuti breaker configuration
resilience4j.circuitbreaker.instances.customers-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.customers-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.customers-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.customers-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.customers-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.customers-service.minimumNumberOfCalls=3
resilience4j.timelimiter.instances.customers-service.timeoutDuration=4s


#Kafka configuration
spring.kafka.admin.properties.bootstrap.servers=localhost:9092
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

#Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

